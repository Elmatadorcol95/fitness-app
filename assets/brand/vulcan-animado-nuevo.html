<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vulcan · logo animado</title>
<style>
  html,body{margin:0;height:100%;background:#0A0D0B;display:flex;align-items:center;justify-content:center;}
  svg{width:300px;height:360px;filter:drop-shadow(0 20px 60px rgba(0,0,0,.5));}
</style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360" role="img" aria-label="Logo animado de Vulcan: martillo de herrero golpeando un yunque con chispas">
    <rect x="0" y="0" width="300" height="360" rx="30" fill="#141A17"/>
  <defs>
    <g id="anvil">
      <path d="M128 178 L240 178 L262 206 L262 214 L214 214 L214 207 L154 207 L154 214 L106 214 L106 206 Z" fill="#3FBF7F"/>
      <path d="M152 126 C161 144 161 162 140 180 L228 180 C208 162 208 144 216 126 Z" fill="#3FBF7F"/>
      <path d="M138 96 L252 96 L252 126 L138 126 Z" fill="#3FBF7F"/>
      <path d="M120 104 L138 104 L138 126 L120 126 Z" fill="#3FBF7F"/>
      <path d="M120 105 Q82 104 54 112 Q86 120 120 124 Z" fill="#3FBF7F"/>
      <path d="M120 124 L152 124 L152 130 L122 132 Z" fill="#2E8C5B"/>
      <path d="M216 124 L252 124 L250 132 L216 130 Z" fill="#2E8C5B"/>
      <path d="M128 178 L240 178 L237 184 L131 184 Z" fill="#2E8C5B"/>
      <rect x="140" y="96" width="112" height="7" rx="3" fill="#5BD897"/>
      <rect x="121" y="104" width="17" height="5" rx="2" fill="#5BD897"/>
      <path d="M120 105 Q86 105 58 112 Q86 114 120 115 Z" fill="#5BD897" opacity="0.85"/>
    </g>
    <g id="hammer">
      <g transform="rotate(-6 160 130)">
        <path d="M150 114 C148 152 147 184 147 200 Q147 216 160 216 Q173 216 173 200 C173 184 172 152 170 114 Z" fill="#5BD897"/>
        <path d="M170 114 C172 152 173 184 173 200 Q173 210 165 214 C169 204 167 152 161 114 Z" fill="#2E8C5B" opacity="0.5"/>
        <ellipse cx="160" cy="206" rx="13" ry="9" fill="#5BD897"/>
        <path d="M112 82 L138 60 L188 60 Q220 60 220 76 L220 102 Q220 120 188 120 L138 120 L112 96 Z" fill="#3FBF7F"/>
        <ellipse cx="158" cy="90" rx="10" ry="17" fill="#2E8C5B" opacity="0.4"/>
        <path d="M112 96 L138 120 L188 120 Q212 120 218 108 L216 118 Q210 124 188 124 L138 124 L112 102 Z" fill="#2E8C5B" opacity="0.5"/>
        <path d="M116 84 L138 64 L188 64 Q210 64 216 71 L188 67 L140 67 L120 86 Z" fill="#5BD897" opacity="0.9"/>
        <rect x="210" y="70" width="8" height="34" rx="4" fill="#5BD897"/>
      </g>
    </g>
    <g id="sparks">
<line x1="-3.7" y1="2.1" x2="-14.9" y2="8.6" stroke="#F2B450" stroke-width="2.5" stroke-linecap="round"/>
<line x1="-6.0" y1="1.9" x2="-15.6" y2="5.1" stroke="#FFD98A" stroke-width="2.4" stroke-linecap="round"/>
<line x1="-3.8" y1="0.3" x2="-16.2" y2="1.1" stroke="#F2B450" stroke-width="2.2" stroke-linecap="round"/>
<line x1="-3.3" y1="-0.6" x2="-21.0" y2="-3.7" stroke="#F2B450" stroke-width="2.8" stroke-linecap="round"/>
<line x1="-6.2" y1="-2.9" x2="-22.2" y2="-10.3" stroke="#F2B450" stroke-width="2.4" stroke-linecap="round"/>
<line x1="-4.2" y1="-3.3" x2="-16.5" y2="-12.9" stroke="#F2B450" stroke-width="3.0" stroke-linecap="round"/>
<line x1="-3.2" y1="-4.1" x2="-10.5" y2="-13.4" stroke="#FFD98A" stroke-width="2.2" stroke-linecap="round"/>
<line x1="-1.3" y1="-3.2" x2="-7.4" y2="-18.2" stroke="#F2B450" stroke-width="2.7" stroke-linecap="round"/>
<line x1="-0.5" y1="-3.4" x2="-3.3" y2="-23.3" stroke="#F2B450" stroke-width="1.9" stroke-linecap="round"/>
<line x1="0.7" y1="-5.1" x2="2.2" y2="-15.8" stroke="#F2B450" stroke-width="1.7" stroke-linecap="round"/>
<line x1="1.9" y1="-4.6" x2="8.6" y2="-21.3" stroke="#F7C97A" stroke-width="2.7" stroke-linecap="round"/>
<line x1="3.3" y1="-4.2" x2="13.4" y2="-17.2" stroke="#F2B450" stroke-width="2.0" stroke-linecap="round"/>
<line x1="4.7" y1="-3.4" x2="15.1" y2="-11.0" stroke="#FFD98A" stroke-width="2.4" stroke-linecap="round"/>
<line x1="4.7" y1="-1.7" x2="18.9" y2="-6.9" stroke="#FFD98A" stroke-width="2.2" stroke-linecap="round"/>
<line x1="6.9" y1="-0.5" x2="16.7" y2="-1.2" stroke="#F7C97A" stroke-width="2.2" stroke-linecap="round"/>
<line x1="3.5" y1="0.8" x2="21.8" y2="4.6" stroke="#FFD98A" stroke-width="1.7" stroke-linecap="round"/>
<line x1="2.9" y1="1.6" x2="20.6" y2="11.0" stroke="#F7C97A" stroke-width="2.7" stroke-linecap="round"/>
<circle cx="-11.2" cy="-13.7" r="1.8" fill="#F7C97A"/>
<circle cx="-11.7" cy="2.8" r="1.5" fill="#FFD98A"/>
<circle cx="7.0" cy="-8.9" r="2.2" fill="#FFD98A"/>
<circle cx="7.5" cy="-23.8" r="1.8" fill="#FFD98A"/>
<circle cx="-11.7" cy="-21.8" r="1.1" fill="#F7C97A"/>
<circle cx="-13.6" cy="-19.1" r="1.8" fill="#F2B450"/>
<circle cx="11.4" cy="-5.9" r="1.5" fill="#F7C97A"/>
<circle cx="20.7" cy="3.0" r="1.3" fill="#F7C97A"/>
<circle cx="5.5" cy="-28.9" r="2.3" fill="#FFD98A"/>
<circle cx="-15.4" cy="-11.3" r="1.6" fill="#F7C97A"/>
<circle cx="12.7" cy="4.1" r="1.4" fill="#F2B450"/>
<circle cx="-8.5" cy="-5.4" r="1.7" fill="#F7C97A"/>
<circle cx="7.2" cy="-15.4" r="1.3" fill="#FFD98A"/>
    </g>
  </defs>
    <g transform="translate(0,8)">
      <use href="#anvil" transform="translate(150,150) scale(0.62) translate(-158,-155)"/>

      <!-- Martillo con swing en bucle -->
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="-42 121 60; 0 121 60; -8 121 60; -3 121 60; -42 121 60"
          keyTimes="0; 0.35; 0.44; 0.56; 1"
          dur="1.3s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.30 0 0.70 1; 0.40 0 0.60 1; 0.40 0 0.60 1; 0.45 0 0.55 1"/>
        <use href="#hammer" transform="translate(170,112) rotate(108) scale(0.58) translate(-220,-104)"/>
      </g>

      <!-- Chispas: estallan en el impacto -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.33;0.40;0.64;1" dur="1.3s" repeatCount="indefinite"/>
        <g transform="translate(165,107)">
          <g>
            <animateTransform attributeName="transform" type="scale"
              values="0.4;0.4;1.15;1.28;0.4" keyTimes="0;0.33;0.42;0.64;1" dur="1.3s" repeatCount="indefinite"/>
            <use href="#sparks"/>
          </g>
        </g>
      </g>
    </g>

    <text x="150" y="262" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="30" font-weight="600" fill="#F1F4F1" letter-spacing="1.5">Vulcan</text>
    <text x="150" y="288" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13.5" fill="#9DA89F">Forjando tu plan…</text>

    <rect x="60" y="312" width="180" height="6" rx="3" fill="#243029"/>
    <rect x="60" y="312" height="6" rx="3" fill="#3FBF7F">
      <animate attributeName="width" values="16;164;16" keyTimes="0;0.5;1" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </rect>
  </svg>
</body>
</html>
